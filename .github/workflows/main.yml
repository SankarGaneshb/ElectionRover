name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run tests
        run: npm test -- --run
      - name: Build
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx
      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest backend/tests/

  e2e:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npx playwright install --with-deps chromium
          pip install -r backend/requirements.txt
          pip install httpx
      - name: Build Frontend
        run: npm run build
      - name: Run E2E Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          export GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          # Start backend in background and wait for it to be ready
          python backend/main.py &
          npx wait-on http://127.0.0.1:8000/health --timeout 30000
          # Update baseURL for playwright in CI to 8000 (backend port)
          npx playwright test --config playwright.config.js --project chromium
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:8000

  deploy:
    needs: [frontend, backend, e2e]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
      - name: 'Configure Docker Auth'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: 'Build and Push Docker Image'
        run: |
          # Dynamically use the GCP_PROJECT_ID secret for the image path
          IMAGE_PATH="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/election-rover:${{ github.sha }}"
          docker build -t $IMAGE_PATH .
          docker push $IMAGE_PATH
      - name: 'Deploy to Cloud Run'
        run: |
          IMAGE_PATH="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/election-rover:${{ github.sha }}"
          gcloud run deploy election-rover \
            --image $IMAGE_PATH \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}"
